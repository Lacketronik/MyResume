name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: FORCE CLEAR DEPLOYMENT DEADLOCK
    steps:
      - uses: actions/checkout@v3

      # Force the deployment action to explicitly send a CLOSE command to unlock Azure's state machine
      - name: Force Close Stuck Environment
        id: forceclose
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_COAST_065CAC210 }}
          action: "close" # <-- This tells Azure to kill any open leases or ghost slots immediately
