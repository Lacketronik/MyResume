#cloud-config
package_update: true
package_upgrade: true

packages:
  - unzip

write_files:
  - path: /etc/systemd/system/myresume-api.service
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=C# Resume API Application
      After=network.target

      [Service]
      WorkingDirectory=/var/www/api
      ExecStart=/usr/bin/dotnet /var/www/api/MyResumeBackend.dll --urls "http://0.0.0.0:5000"
      Restart=always
      RestartSec=10
      KillSignal=SIGINT
      SyslogIdentifier=myresume-api
      User=azureuser
      Environment=ASPNETCORE_ENVIRONMENT=Production
      Environment=DOTNET_PRINT_TELEMETRY_MESSAGE=false
      Environment=ASPNETCORE_URLS=http://0.0.0.0:5000

      Environment="ConnectionStrings__DefaultConnection=Server=${db_vm_ip};Database=my_resume_db;User Id=sa;Password=${sql_admin_password};TrustServerCertificate=True;"
      Environment="Cors__AllowedOrigins=https://faliqdoescoding.com,https://www.faliqdoescoding.com"

      [Install]
      WantedBy=multi-user.target

runcmd:
  - curl https://packages.microsoft.com/keys/microsoft.asc
  - curl https://packages.microsoft.com/config/ubuntu/24.04/prod.list
  - apt-get install -y dotnet-runtime-10.0
  - apt-get install -y aspnetcore-runtime-10.0
  - mkdir -p /var/www/api
  - chown -R azureuser:azureuser /var/www/api
  - wget -O /tmp/backend.zip "${download_url}"
  - unzip /tmp/backend.zip -d /var/www/api/
  
  - systemctl daemon-reload
  - systemctl enable myresume-api.service
  - systemctl start myresume-api.service